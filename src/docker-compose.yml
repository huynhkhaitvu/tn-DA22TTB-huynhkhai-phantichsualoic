services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app:delegated
      - backend_data:/app/data
    environment:
      FLASK_ENV: development
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      SECRET_KEY: dev-secret-key-change-in-production
      FLASK_RUN_HOST: 0.0.0.0
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend_data:

